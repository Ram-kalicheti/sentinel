name: 'sentinel'
version: '1.0.0'
config-version: 2
profile: 'sentinel'

model-paths: ["models"]
target-path: "target"
clean-targets: ["target", "dbt_packages", "logs"]

# Source layers live as path-based Delta on sentinelstgrk1 (Hive metastore is DISABLED,
# so we read them via  delta.`abfss://...`  rather than catalog.schema.table).
# >>> CONFIRM these two paths against pipeline/common/config.py before the first run. <<<
vars:
  silver_transactions_path: "abfss://silver@sentinelstgrk1.dfs.core.windows.net/silver_transactions"
  dim_customers_path: "abfss://silver@sentinelstgrk1.dfs.core.windows.net/dim_customers"

models:
  sentinel:
    staging:
      +materialized: view
    intermediate:
      +materialized: incremental
      +file_format: delta
      +incremental_strategy: merge
