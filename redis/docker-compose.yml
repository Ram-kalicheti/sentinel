services:
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    # local dev uses plain redis on 6379 a managed azure cache would require rediss on 6380
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - sentinel-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sentinel-redis-data: